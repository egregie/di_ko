<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#F8F6F4" stroke="#D7E0CE" stroke-width="1.5"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2C3440"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="200" y="25" font-family="Arimo, sans-serif" font-size="14" font-weight="bold" fill="#2C3440" text-anchor="middle">Салициловая кислота: Механизм десмолиза</text>

  <!-- ══ LEFT: Intact Desmosomes ══ -->

  <!-- Section label (free text) -->
  <text x="95" y="58" font-family="Arimo, sans-serif" font-size="11" font-weight="bold" fill="#2C3440" text-anchor="middle">Плотный роговой слой</text>

  <!-- Corneocyte 1 rect (NO text inside group to avoid container checks) -->
  <rect x="30" y="90" width="50" height="150" rx="4" fill="#D7E0CE" stroke="#6D8470" stroke-width="1.5"/>
  <!-- Corneocyte 2 rect -->
  <rect x="110" y="90" width="50" height="150" rx="4" fill="#D7E0CE" stroke="#6D8470" stroke-width="1.5"/>

  <!-- Small horizontal labels above corneocytes -->
  <text x="55" y="86" font-family="Arimo, sans-serif" font-size="8" fill="#3D4A40" text-anchor="middle">C-1</text>
  <text x="135" y="86" font-family="Arimo, sans-serif" font-size="8" fill="#3D4A40" text-anchor="middle">C-2</text>

  <!-- Intact Desmosome Bridges -->
  <rect x="80" y="115" width="30" height="6" fill="#E6D2CA" stroke="#2C3440" stroke-width="0.75"/>
  <rect x="80" y="155" width="30" height="6" fill="#E6D2CA" stroke="#2C3440" stroke-width="0.75"/>
  <rect x="80" y="195" width="30" height="6" fill="#E6D2CA" stroke="#2C3440" stroke-width="0.75"/>

  <!-- Status label (free text) -->
  <text x="95" y="255" font-family="Arimo, sans-serif" font-size="9" fill="#3D4A40" text-anchor="middle">Десмосомы интактны</text>

  <!-- ══ MIDDLE Arrow: BHA Action ══ -->
  <path d="M 178 165 L 213 165" fill="none" stroke="#2C3440" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="196" y="152" font-family="Arimo, sans-serif" font-size="10" font-weight="bold" fill="#6D8470" text-anchor="middle">BHA</text>
  <text x="196" y="184" font-family="Arimo, sans-serif" font-size="9" fill="#3D4A40" text-anchor="middle">Эксфолиация</text>

  <!-- ══ RIGHT: Desmolysis ══ -->

  <!-- Section label (free text) -->
  <text x="305" y="58" font-family="Arimo, sans-serif" font-size="11" font-weight="bold" fill="#9E6A5A" text-anchor="middle">Десмолиз и десквамация</text>

  <!-- Corneocyte 1 (tilted slightly) -->
  <g transform="translate(220, 90) rotate(-2, 25, 75)">
    <rect x="0" y="0" width="50" height="150" rx="4" fill="#D7E0CE" stroke="#6D8470" stroke-width="1.5"/>
  </g>
  <!-- Corneocyte 2 (tilted slightly other way) -->
  <g transform="translate(320, 90) rotate(2, 25, 75)">
    <rect x="0" y="0" width="50" height="150" rx="4" fill="#D7E0CE" stroke="#6D8470" stroke-width="1.5"/>
  </g>

  <!-- Small horizontal labels above right corneocytes -->
  <text x="245" y="86" font-family="Arimo, sans-serif" font-size="8" fill="#3D4A40" text-anchor="middle">C-1</text>
  <text x="345" y="86" font-family="Arimo, sans-serif" font-size="8" fill="#3D4A40" text-anchor="middle">C-2</text>

  <!-- Broken Desmosomes -->
  <line x1="270" y1="118" x2="282" y2="118" stroke="#9E6A5A" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="300" y1="118" x2="312" y2="118" stroke="#9E6A5A" stroke-width="1.5" stroke-dasharray="2,2"/>

  <line x1="270" y1="158" x2="282" y2="158" stroke="#9E6A5A" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="300" y1="158" x2="312" y2="158" stroke="#9E6A5A" stroke-width="1.5" stroke-dasharray="2,2"/>

  <line x1="270" y1="198" x2="282" y2="198" stroke="#9E6A5A" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="300" y1="198" x2="312" y2="198" stroke="#9E6A5A" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- BHA attack star symbols -->
  <polygon points="291,112 294,116 299,116 295,119 297,124 291,121 285,124 287,119 283,116 288,116" fill="#9E6A5A" stroke="#2C3440" stroke-width="0.5"/>
  <polygon points="291,152 294,156 299,156 295,159 297,164 291,161 285,164 287,159 283,156 288,156" fill="#9E6A5A" stroke="#2C3440" stroke-width="0.5"/>
  <polygon points="291,192 294,196 299,196 295,199 297,204 291,201 285,204 287,199 283,196 288,196" fill="#9E6A5A" stroke="#2C3440" stroke-width="0.5"/>

  <!-- Status label (free text) -->
  <text x="305" y="255" font-family="Arimo, sans-serif" font-size="9" fill="#9E6A5A" font-weight="bold" text-anchor="middle">Связи разрушены BHA</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 300" width="100%" height="100%">
  <!-- Title -->
  <text x="225" y="22" font-family="Arimo, sans-serif" font-size="14" font-weight="bold" fill="#2C3440" text-anchor="middle">
    Чрескожное всасывание L-аскорбиновой кислоты
  </text>

  <!-- Left Panel: pH Dependency -->
  <g transform="translate(40, 50)">
    <!-- Title Left -->
    <text x="75" y="15" font-family="Arimo, sans-serif" font-size="11" font-weight="bold" fill="#2C3440" text-anchor="middle">Зависимость от pH</text>
    
    <!-- Grid & Axes -->
    <line x1="20" y1="180" x2="150" y2="180" stroke="#2C3440" stroke-width="1.5" /> <!-- X axis -->
    <line x1="20" y1="30" x2="20" y2="180" stroke="#2C3440" stroke-width="1.5" />  <!-- Y axis -->
    
    <!-- Ideal pH Zone Highlight (pH < 3.5) -->
    <rect x="21" y="30" width="67" height="149" fill="#D7E0CE" opacity="0.5" />
    <text x="54" y="60" font-family="Arimo, sans-serif" font-size="9" fill="#6D8470" font-weight="bold" text-anchor="middle">Оптимум (pH &lt; 3.5)</text>

    <!-- Curve (pH 2.0 to 5.0) -->
    <!-- pH 2.0 (x=20, y=50) -> pH 3.0 (x=65, y=70) -> pH 3.5 (x=88, y=100) -> pH 4.0 (x=110, y=170) -> pH 5.0 (x=150, y=178) -->
    <path d="M 20 50 Q 75 60 88 100 T 150 178" fill="none" stroke="#9E6A5A" stroke-width="2.5" />

    <!-- Ticks & Labels -->
    <!-- Y Ticks -->
    <line x1="16" y1="50" x2="20" y2="50" stroke="#2C3440" />
    <text x="12" y="53" font-family="Arimo, sans-serif" font-size="8" fill="#3D4A40" text-anchor="end">Max</text>
    <line x1="16" y1="180" x2="20" y2="180" stroke="#2C3440" />
    <text x="12" y="183" font-family="Arimo, sans-serif" font-size="8" fill="#3D4A40" text-anchor="end">Min</text>

    <!-- X Ticks -->
    <line x1="20" y1="180" x2="20" y2="184" stroke="#2C3440" />
    <text x="20" y="194" font-family="Arimo, sans-serif" font-size="9" fill="#3D4A40" text-anchor="middle">2.0</text>
    
    <line x1="88" y1="180" x2="88" y2="184" stroke="#2C3440" />
    <text x="88" y="194" font-family="Arimo, sans-serif" font-size="9" fill="#3D4A40" text-anchor="middle">3.5</text>
    
    <line x1="150" y1="180" x2="150" y2="184" stroke="#2C3440" />
    <text x="150" y="194" font-family="Arimo, sans-serif" font-size="9" fill="#3D4A40" text-anchor="middle">5.0</text>

    <text x="85" y="212" font-family="Arimo, sans-serif" font-size="10" fill="#2C3440" text-anchor="middle">Уровень pH формулы</text>
  </g>

  <!-- Right Panel: Concentration Dependency -->
  <g transform="translate(250, 50)">
    <!-- Title Right -->
    <text x="75" y="15" font-family="Arimo, sans-serif" font-size="11" font-weight="bold" fill="#2C3440" text-anchor="middle">Зависимость от конц.</text>
    
    <!-- Grid & Axes -->
    <line x1="20" y1="180" x2="150" y2="180" stroke="#2C3440" stroke-width="1.5" /> <!-- X axis -->
    <line x1="20" y1="30" x2="20" y2="180" stroke="#2C3440" stroke-width="1.5" />  <!-- Y axis -->

    <!-- Peak Line at 20% -->
    <line x1="85" y1="30" x2="85" y2="180" stroke="#6D8470" stroke-width="1.5" stroke-dasharray="3,3" />
    <rect x="80" y="35" width="65" height="25" fill="#E6D2CA" rx="4" />
    <text x="112" y="47" font-family="Arimo, sans-serif" font-size="8" font-weight="bold" fill="#2C3440" text-anchor="middle">Плато (20%-40%)</text>

    <!-- Curve (0% to 40%) -->
    <!-- 0% (x=20, y=180) -> 10% (x=52, y=95) -> 20% (x=85, y=50) -> 30% (x=117, y=50) -> 40% (x=150, y=50) -->
    <path d="M 20 180 Q 60 70 85 50 L 150 50" fill="none" stroke="#6D8470" stroke-width="2.5" />

    <!-- Ticks & Labels -->
    <!-- X Ticks -->
    <line x1="20" y1="180" x2="20" y2="184" stroke="#2C3440" />
    <text x="20" y="194" font-family="Arimo, sans-serif" font-size="9" fill="#3D4A40" text-anchor="middle">0%</text>
    
    <line x1="85" y1="180" x2="85" y2="184" stroke="#2C3440" />
    <text x="85" y="194" font-family="Arimo, sans-serif" font-size="9" fill="#3D4A40" text-anchor="middle">20%</text>
    
    <line x1="150" y1="180" x2="150" y2="184" stroke="#2C3440" />
    <text x="150" y="194" font-family="Arimo, sans-serif" font-size="9" fill="#3D4A40" text-anchor="middle">40%</text>

    <text x="85" y="212" font-family="Arimo, sans-serif" font-size="10" fill="#2C3440" text-anchor="middle">Концентрация L-AA</text>
  </g>
</svg>

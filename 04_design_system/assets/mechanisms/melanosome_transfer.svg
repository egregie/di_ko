<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#2C3440" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="200" y="25" font-family="Arimo, sans-serif" font-size="14" font-weight="bold" fill="#2C3440" text-anchor="middle">
    Подавление переноса меланосом в кератиноциты
  </text>

  <!-- Keratinocyte layer (Top) -->
  <g transform="translate(40, 50)">
    <!-- Keratinocyte 1 -->
    <rect x="0" y="0" width="140" height="50" rx="4" fill="#D7E0CE" stroke="#6D8470" stroke-width="1.5" />
    <text x="70" y="22" font-family="Arimo, sans-serif" font-size="11" font-weight="bold" fill="#2C3440" text-anchor="middle">Keratinocyte</text>
    <text x="70" y="38" font-family="Arimo, sans-serif" font-size="9" fill="#3D4A40" text-anchor="middle">Кератиноцит эпидермиса</text>
    
    <!-- Keratinocyte 2 -->
    <rect x="180" y="0" width="140" height="50" rx="4" fill="#D7E0CE" stroke="#6D8470" stroke-width="1.5" />
    <text x="250" y="22" font-family="Arimo, sans-serif" font-size="11" font-weight="bold" fill="#2C3440" text-anchor="middle">Keratinocyte</text>
    <text x="250" y="38" font-family="Arimo, sans-serif" font-size="9" fill="#3D4A40" text-anchor="middle">Кератиноцит эпидермиса</text>
  </g>

  <!-- Niacinamide Blocking Line (Middle) -->
  <g transform="translate(20, 125)">
    <!-- Red/brown block bar -->
    <rect x="0" y="0" width="360" height="15" rx="4" fill="#E6D2CA" stroke="#9E6A5A" stroke-width="1.5" />
    <text x="180" y="11" font-family="Arimo, sans-serif" font-size="9" font-weight="bold" fill="#9E6A5A" text-anchor="middle">БЛОКАДА ПЕРЕНОСА МЕЛАНОСОМ НИАЦИНАМИДОМ (35–68%)</text>
  </g>

  <!-- Melanocyte with Dendrites (Bottom) -->
  <g transform="translate(40, 170)">
    <!-- Melanocyte Cell Body -->
    <rect x="110" y="70" width="100" height="40" rx="20" fill="#F8F6F4" stroke="#2C3440" stroke-width="2" />
    <text x="160" y="94" font-family="Arimo, sans-serif" font-size="11" font-weight="bold" fill="#2C3440" text-anchor="middle">Melanocyte</text>
    
    <!-- Dendrites (Branches extending up towards Keratinocytes) -->
    <!-- Left Dendrite -->
    <path d="M 130 70 C 110 50, 70 30, 70 10" fill="none" stroke="#2C3440" stroke-width="4" stroke-linecap="round" />
    <!-- Right Dendrite -->
    <path d="M 190 70 C 210 50, 250 30, 250 10" fill="none" stroke="#2C3440" stroke-width="4" stroke-linecap="round" />

    <!-- Melanosomes (melanin granules) inside and at dendrite tips -->
    <!-- In body -->
    <circle cx="130" cy="85" r="4" fill="#1D291C" />
    <circle cx="150" cy="80" r="4" fill="#1D291C" />
    <circle cx="170" cy="85" r="4" fill="#1D291C" />
    
    <!-- Along dendrite 1 (moving up) -->
    <circle cx="110" cy="50" r="3.5" fill="#1D291C" />
    <circle cx="85" cy="30" r="3.5" fill="#1D291C" />
    <circle cx="70" cy="12" r="3.5" fill="#1D291C" />
    
    <!-- Along dendrite 2 (moving up) -->
    <circle cx="210" cy="50" r="3.5" fill="#1D291C" />
    <circle cx="235" cy="30" r="3.5" fill="#1D291C" />
    <circle cx="250" cy="12" r="3.5" fill="#1D291C" />

    <!-- Arrows indicating block direction -->
    <path d="M 70 10 L 70 -20" fill="none" stroke="#9E6A5A" stroke-width="1.5" stroke-dasharray="3,3" />
    <path d="M 250 10 L 250 -20" fill="none" stroke="#9E6A5A" stroke-width="1.5" stroke-dasharray="3,3" />

    <text x="70" y="-28" font-family="Arimo, sans-serif" font-size="8" fill="#9E6A5A" text-anchor="middle">X</text>
    <text x="250" y="-28" font-family="Arimo, sans-serif" font-size="8" fill="#9E6A5A" text-anchor="middle">X</text>
  </g>
</svg>
